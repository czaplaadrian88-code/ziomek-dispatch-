# Canonical replacement for /etc/logrotate.d/dispatch-v2.
#
# This global-logrotate fragment intentionally contains only traditional
# ``*.log`` files. Dispatch JSONL is rotated by the dedicated candidate
# ``dispatch-v2-jsonl-logrotate.service`` using
# ``deploy/dispatch-v2-jsonl-logrotate.conf``. Keeping the JSONL paths out of
# /etc/logrotate.d prevents an unlocked second rotation by the global timer.

/root/.openclaw/workspace/scripts/logs/*.log
{
    daily
    rotate 14
    maxsize 50M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su root root
    create 0644 root root
    sharedscripts
}

/root/.openclaw/workspace/scripts/ml_data_prep/logs/*.log
{
    weekly
    rotate 4
    compress
    missingok
    notifempty
    copytruncate
    su root root
    create 0644 root root
}
