# FALA1 watchdog-close (2026-07-02) — durability fix for audyt 2.0 finding A / §4.
#
# dispatch-state-panel-monitor.timer was in the collective disable of 26.06 19:43:41
# (state<->panel divergence watchdog, Faza 5). Base scheduled only via
# OnUnitActiveSec=10min → no wall-clock anchor. Re-anchor to OnCalendar so a
# daemon-reload / collective disable cannot silently stop it again.
#
# No double-fire: "" resets the whole timer list (systemd.timer(5)); re-declare one basis.
# Persistent left at base default (false) — 10-min cadence needs no catch-up burst.
# Expected merged — verify: systemctl cat dispatch-state-panel-monitor.timer
#   OnBootSec=5min ; OnCalendar=*:0/10 ; Persistent=false
# systemd-analyze calendar '*:0/10'  -> every 10 min on the wall clock (:00,:10,:20,...)
[Timer]
OnUnitActiveSec=
OnBootSec=5min
OnCalendar=*:0/10
