# devlint (K01 refaktor): mypy w trybie łagodnym — ratchet "nie gorzej", nie strict.
# Zakres: moduły rdzenia wymienione w ratchet_check.py (MYPY_MODULES), nie całe repo.
[mypy]
python_version = 3.12
ignore_missing_imports = True
follow_imports = silent
no_error_summary = False
show_error_codes = True
# Świadomie BEZ strict/disallow_* — kod nietypowany; celem jest łapanie
# oczywistych błędów (arg-type, attr-defined, return-value) i ratchet w dół.
